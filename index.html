<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Cairo — Guía de Viaje</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --sand:#F5EDD8;--cream:#FBF6EC;--ink:#2D2010;--deep:#1A1208;
  --gold:#C9953A;--gold-light:#F0C96A;
  --lapis:#2B4F7A;--lapis-l:#3D6FA3;--terra:#C4622D;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'DM Sans',sans-serif;font-weight:300;background:var(--cream);color:var(--ink);overflow:hidden;}

/* ── HEADER — compact ── */
header{background:var(--deep);padding:.7rem 1.5rem .5rem;text-align:center;position:relative;overflow:hidden;flex-shrink:0;}
header::before{content:'';position:absolute;inset:0;opacity:.04;
  background-image:repeating-linear-gradient(45deg,var(--gold) 0,var(--gold) 1px,transparent 0,transparent 50%);
  background-size:18px 18px;}
.hc{position:relative;z-index:1;}
.eyebrow{font-size:.58rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:.2rem;}
header h1{font-family:'Playfair Display',serif;font-size:clamp(1.1rem,2.5vw,1.9rem);color:var(--sand);line-height:1.1;margin-bottom:.15rem;}
header h1 em{color:var(--gold-light);font-style:italic;}
.hsub{color:rgba(245,237,216,.38);font-size:.65rem;}

/* ── ZONE BAR — two rows on mobile ── */
.zone-bar{
  background:var(--deep);border-top:1px solid rgba(201,149,58,.15);
  padding:.38rem .8rem;display:flex;flex-wrap:wrap;gap:.25rem;justify-content:center;
}
.ztab{
  display:flex;align-items:center;gap:.32rem;padding:.22rem .55rem;
  font-size:.64rem;font-weight:500;cursor:pointer;border-radius:20px;
  border:1.5px solid transparent;color:rgba(245,237,216,.52);transition:all .18s;white-space:nowrap;
}
.ztab:hover{color:var(--sand);background:rgba(255,255,255,.05);}
.ztab.active{color:white;border-color:currentColor;background:rgba(255,255,255,.08);}
.ztab-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* ── TOUCH HINT ── */
.touch-hint{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  background:rgba(26,18,8,.72);backdrop-filter:blur(6px);
  color:rgba(245,237,216,.75);font-size:.65rem;font-weight:500;
  padding:.35rem .85rem;border-radius:20px;
  pointer-events:none;white-space:nowrap;
  animation:hintFade 3s ease 1.5s forwards;
  opacity:0;animation-fill-mode:both;
}
@keyframes hintFade{
  0%{opacity:0;transform:translateX(-50%) translateY(4px);}
  15%{opacity:1;transform:translateX(-50%) translateY(0);}
  75%{opacity:1;}
  100%{opacity:0;}
}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:calc(100vh - 88px);}
.right{flex:1;display:flex;flex-direction:column;min-height:0;position:relative;}

/* ── MAP ── */
.map-panel{flex:1;position:relative;overflow:hidden;background:#eddfc0;min-height:0;}
#cairo-map{width:100%;height:100%;display:block;}

/* Zone areas */
.zone-area{transition:opacity .25s,filter .25s;cursor:pointer;}
.zone-area:hover{filter:brightness(1.08);}
.zone-area.dimmed{opacity:.18;filter:grayscale(.5);}
.zone-area.highlighted{opacity:1;filter:brightness(1.1) drop-shadow(0 0 12px rgba(0,0,0,.3));}

/* Pins — larger invisible tap area */
.map-pin{cursor:pointer;transition:transform .18s;}
.map-pin:hover{transform:scale(1.2);}
.map-pin.active-pin{transform:scale(1.38);}
.map-pin.dimmed-pin{opacity:.15;}
.pin-tap{fill:transparent;} /* invisible large tap area */
.pin-must-ring{transform-origin:center;transform-box:fill-box;animation:pulse 2.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.9;transform:scale(1);}50%{opacity:.2;transform:scale(1.45);}}

/* ── BOTTOM SHEET — slides up over map ── */
.sheet-overlay{
  position:absolute;inset:0;background:rgba(26,18,8,.0);
  pointer-events:none;transition:background .25s;z-index:10;
}
.sheet-overlay.open{pointer-events:all;background:rgba(26,18,8,.25);}

.detail-panel{
  position:absolute;bottom:0;left:0;right:0;
  background:white;border-radius:18px 18px 0 0;
  box-shadow:0 -4px 32px rgba(0,0,0,.18);
  max-height:72vh;overflow-y:auto;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.32,1,.44,1);
  z-index:11;
}
.detail-panel.vis{transform:translateY(0);}

/* Sheet drag handle */
.sheet-handle{
  width:36px;height:4px;border-radius:2px;
  background:rgba(45,32,16,.15);
  margin:.7rem auto .3rem;
}

.dp-inner{padding:.6rem 1.4rem 1.4rem;}
.dp-hdr{display:flex;align-items:flex-start;gap:.7rem;margin-bottom:.65rem;}
.dp-ico{font-size:1.55rem;line-height:1;flex-shrink:0;}
.dp-ta{flex:1;min-width:0;}
.dp-zt{font-size:.56rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.12rem;}
.dp-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--ink);line-height:1.2;}
.dp-badges{display:flex;gap:.22rem;flex-wrap:wrap;margin-top:.22rem;}
.pb{font-size:.54rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:.1rem .36rem;border-radius:3px;color:white;}
.pb.must{background:var(--terra);}
.pb.book{background:var(--lapis);}
.pb.warn{background:#b45309;}
.dp-close{
  background:rgba(45,32,16,.08);border:none;cursor:pointer;
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;color:rgba(45,32,16,.5);flex-shrink:0;
}
.dp-close:hover{background:rgba(45,32,16,.14);color:var(--ink);}

.dp-body{display:grid;grid-template-columns:1fr 205px;gap:1.1rem;align-items:start;}
.dp-desc{font-size:.78rem;line-height:1.65;color:rgba(45,32,16,.8);}
.dp-meta{display:flex;flex-direction:column;gap:.35rem;}
.mr{font-size:.69rem;display:flex;gap:.28rem;align-items:flex-start;}
.ml{font-weight:600;color:rgba(45,32,16,.4);white-space:nowrap;min-width:42px;flex-shrink:0;}
.mv{color:var(--ink);}
.price-box{background:rgba(201,149,58,.08);border:1px solid rgba(201,149,58,.22);border-radius:6px;padding:.36rem .5rem;margin-top:.16rem;}
.warn-box{background:rgba(180,83,9,.07);border:1px solid rgba(180,83,9,.2);border-radius:6px;padding:.34rem .48rem;font-size:.67rem;color:#92400e;margin-top:.36rem;line-height:1.45;}

/* ── CTA BUTTONS ── */
.dp-cta{margin-top:.85rem;display:flex;gap:.5rem;flex-wrap:wrap;}
.btn-b,.btn-m{
  display:inline-flex;align-items:center;justify-content:center;gap:.32rem;
  text-decoration:none;font-size:.76rem;font-weight:600;
  padding:.6rem 1rem;border-radius:8px;
  min-height:44px;cursor:pointer;transition:all .15s;
}
.btn-b{background:var(--lapis);color:white;border:none;}
.btn-b:hover{background:var(--lapis-l);}
.btn-m{background:rgba(196,98,45,.1);color:var(--terra);border:1.5px solid rgba(196,98,45,.28);}
.btn-m:hover{background:rgba(196,98,45,.18);}

/* Scrollbar */
.detail-panel::-webkit-scrollbar{width:4px;}
.detail-panel::-webkit-scrollbar-thumb{background:rgba(196,98,45,.18);border-radius:2px;}

/* ── LAPTOP — side panel ── */
@media(min-width:1024px){
  html,body{overflow:hidden;}
  .app{flex-direction:row;height:calc(100vh - 88px);}
  .right{flex-direction:row;flex:1;}
  .map-panel{flex:1;}

  /* On laptop: panel is a fixed right column, not a bottom sheet */
  .sheet-overlay{display:none;}
  .detail-panel{
    position:relative;bottom:auto;left:auto;right:auto;
    transform:none!important;
    width:360px;flex-shrink:0;border-radius:0;
    border-left:2px solid rgba(196,98,45,.12);
    max-height:100%;box-shadow:none;
    display:none;
  }
  .detail-panel.vis{display:flex;flex-direction:column;}
  .sheet-handle{display:none;}
  .touch-hint{display:none;}
}

/* ── MOBILE tweaks ── */
@media(max-width:640px){
  .dp-body{grid-template-columns:1fr;}
  .dp-inner{padding:.5rem 1.1rem 1.2rem;}
  header{padding:.55rem 1rem .4rem;}
  .zone-bar{padding:.32rem .5rem;}
  .ztab{font-size:.6rem;padding:.2rem .45rem;}
  .app{height:calc(100vh - 80px);}
}
</style>
</head>

let activeZone=null, activePlace=null;

function buildTabs(){
  const c=document.getElementById('zoneTabs');
  const all=document.createElement('div');
  all.className='ztab active'; all.id='ztab-all';
  all.innerHTML=`<span class="ztab-dot" style="background:rgba(245,237,216,.35)"></span>Todos`;
  all.onclick=()=>selectZone(null);
  c.appendChild(all);
  Object.entries(ZONES).forEach(([k,z])=>{
    const t=document.createElement('div');
    t.className='ztab'; t.id='ztab-'+k; t.style.color=z.color;
    const parts=z.name.split('—');
    const num=parts[0].trim(); const name=(parts[1]||'').trim();
    t.innerHTML=`<span class="ztab-dot" style="background:${z.color}"></span><span style="font-size:.56rem;opacity:.6">${num} ·</span> ${name}`;
    t.onclick=()=>selectZone(k);
    c.appendChild(t);
  });
}

function buildPins(){
  const layer=document.getElementById('pins-layer');
  layer.innerHTML='';
  PL.forEach(p=>{
    const pos=PP[p.id]; if(!pos) return;
    const zc=ZONES[p.zone].color;
    const r=p.must?14:9;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','map-pin');
    g.setAttribute('id','pin-'+p.id);
    g.setAttribute('transform',`translate(${pos.x},${pos.y})`);
    g.setAttribute('data-id',p.id);

    // Large invisible tap area (better mobile UX)
    const tap=document.createElementNS('http://www.w3.org/2000/svg','circle');
    tap.setAttribute('class','pin-tap');
    tap.setAttribute('cx','0'); tap.setAttribute('cy','0');
    tap.setAttribute('r', p.must ? '22' : '18');
    g.appendChild(tap);

    // Pulsing ring for must
    if(p.must){
      const ring=document.createElementNS('http://www.w3.org/2000/svg','circle');
      ring.setAttribute('class','pin-must-ring');
      ring.setAttribute('cx','0'); ring.setAttribute('cy','0');
      ring.setAttribute('r',String(r+5));
      ring.setAttribute('fill','none');
      ring.setAttribute('stroke','#F0C96A');
      ring.setAttribute('stroke-width','2.5');
      g.appendChild(ring);
    }
    // Shadow
    const sh=document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    sh.setAttribute('cx','1'); sh.setAttribute('cy',String(r+5));
    sh.setAttribute('rx',String(r*.55)); sh.setAttribute('ry','2.5');
    sh.setAttribute('fill','rgba(0,0,0,.28)');
    g.appendChild(sh);
    // Circle
    const ci=document.createElementNS('http://www.w3.org/2000/svg','circle');
    ci.setAttribute('class','pin-circle');
    ci.setAttribute('cx','0'); ci.setAttribute('cy','0');
    ci.setAttribute('r',String(r));
    ci.setAttribute('fill',zc);
    ci.setAttribute('stroke','white');
    ci.setAttribute('stroke-width',p.must?'2.2':'1.8');
    g.appendChild(ci);
    // Icon
    const tx=document.createElementNS('http://www.w3.org/2000/svg','text');
    tx.setAttribute('x','0'); tx.setAttribute('y',p.must?'5.5':'3.8');
    tx.setAttribute('text-anchor','middle');
    tx.setAttribute('font-size',p.must?'13':'10');
    tx.textContent=p.icon;
    g.appendChild(tx);
    // Warn badge
    if(p.warn){
      const bc=document.createElementNS('http://www.w3.org/2000/svg','circle');
      bc.setAttribute('cx',String(r)); bc.setAttribute('cy',String(-r));
      bc.setAttribute('r','5.5'); bc.setAttribute('fill','#b45309');
      bc.setAttribute('stroke','white'); bc.setAttribute('stroke-width','1.5');
      g.appendChild(bc);
      const bt=document.createElementNS('http://www.w3.org/2000/svg','text');
      bt.setAttribute('x',String(r)); bt.setAttribute('y',String(-r+4));
      bt.setAttribute('text-anchor','middle'); bt.setAttribute('font-size','7.5');
      bt.setAttribute('fill','white'); bt.textContent='!';
      g.appendChild(bt);
    }
    // Label (must only)
    if(p.must){
      const lb=document.createElementNS('http://www.w3.org/2000/svg','text');
      lb.setAttribute('x','0'); lb.setAttribute('y',String(r+16));
      lb.setAttribute('text-anchor','middle');
      lb.setAttribute('font-size','8');
      lb.setAttribute('font-family','DM Sans,sans-serif');
      lb.setAttribute('font-weight','700');
      lb.setAttribute('fill',zc);
      lb.setAttribute('stroke','rgba(232,213,168,.95)');
      lb.setAttribute('stroke-width','3.5');
      lb.setAttribute('paint-order','stroke');
      lb.textContent=p.name.length>16?p.name.slice(0,15)+'…':p.name;
      g.appendChild(lb);
    }
    g.addEventListener('click',()=>selectPlace(p.id));
    layer.appendChild(g);
  });
}

function selectZone(zone){
  activeZone=zone; activePlace=null;
  document.querySelectorAll('.ztab').forEach(t=>t.classList.remove('active'));
  const tab=document.getElementById('ztab-'+(zone||'all'));
  if(tab) tab.classList.add('active');
  document.querySelectorAll('.zone-area').forEach(el=>{
    el.classList.toggle('dimmed',!!zone && el.dataset.zone!==zone);
    el.classList.toggle('highlighted',!!zone && el.dataset.zone===zone);
  });
  document.querySelectorAll('.map-pin').forEach(pin=>{
    const p=PL.find(x=>x.id===pin.getAttribute('data-id'));
    pin.classList.toggle('dimmed-pin',!!zone && (!p||p.zone!==zone));
  });
  closeDetail();
}

function selectPlace(id){
  const p=PL.find(x=>x.id===id); if(!p) return;
  activePlace=id;
  if(activeZone!==p.zone){
    activeZone=p.zone;
    document.querySelectorAll('.ztab').forEach(t=>t.classList.remove('active'));
    const tab=document.getElementById('ztab-'+p.zone);
    if(tab) tab.classList.add('active');
    document.querySelectorAll('.zone-area').forEach(el=>{
      el.classList.toggle('dimmed',el.dataset.zone!==p.zone);
      el.classList.toggle('highlighted',el.dataset.zone===p.zone);
    });
    document.querySelectorAll('.map-pin').forEach(pin=>{
      const pp=PL.find(x=>x.id===pin.getAttribute('data-id'));
      pin.classList.toggle('dimmed-pin',!!pp && pp.zone!==p.zone);
    });
  }
  document.querySelectorAll('.map-pin').forEach(pin=>
    pin.classList.toggle('active-pin',pin.getAttribute('data-id')===id));

  const z=ZONES[p.zone];
  document.getElementById('dIcon').textContent=p.icon;
  document.getElementById('dZone').textContent=z.name;
  document.getElementById('dZone').style.color=z.color;
  document.getElementById('dTitle').textContent=p.name;
  const bh=[
    p.must?'<span class="pb must">⭐ Imprescindible</span>':'',
    p.book?'<span class="pb book">📅 Reserva previa</span>':'',
    p.warn?'<span class="pb warn">⚠️ Leer aviso</span>':'',
  ].filter(Boolean).join(' ');
  document.getElementById('dBadges').innerHTML=bh;
  document.getElementById('dDesc').textContent=p.desc;
  document.getElementById('dWarn').innerHTML=p.warn?`<div class="warn-box">${p.warn}</div>`:'';
  let mh='';
  if(p.hours) mh+=`<div class="mr"><span class="ml">🕐</span><span class="mv">${p.hours}</span></div>`;
  if(p.tip)   mh+=`<div class="mr"><span class="ml">💡</span><span class="mv">${p.tip}</span></div>`;
  if(p.prices?.length){
    mh+=`<div class="price-box">`;
    p.prices.forEach(r=>{ mh+=`<div class="mr"><span class="ml">${r.l}</span><span class="mv">${r.v}</span></div>`; });
    mh+=`</div>`;
  }
  document.getElementById('dMeta').innerHTML=mh;
  const btns=[];
  if(p.bookUrl) btns.push(`<a class="btn-b" href="${p.bookUrl}" target="_blank" rel="noopener">📅 Reservar / Contactar</a>`);
  if(p.mapsUrl) btns.push(`<a class="btn-m" href="${p.mapsUrl}" target="_blank" rel="noopener">📍 Abrir en Google Maps</a>`);
  document.getElementById('dCta').innerHTML=btns.join('');

  // Open bottom sheet
  document.getElementById('detailPanel').classList.add('vis');
  document.getElementById('sheetOverlay').classList.add('open');
}

function closeDetail(){
  document.getElementById('detailPanel').classList.remove('vis');
  document.getElementById('sheetOverlay').classList.remove('open');
  document.querySelectorAll('.map-pin').forEach(p=>p.classList.remove('active-pin'));
  activePlace=null;
}

buildTabs();
buildPins();
</script>
